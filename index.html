<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrackIt! - Hacker Terminal</title>
    <meta name="description" content="Ace your coding interviews with CrackIt!, your ultimate AI coding sidekick.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <div class="grid-overlay"></div>

    <nav>
        <div class="nav-container">
            <div class="logo-wrapper">
                <img src="a4343ad0-3c8f-4330-9bba-78b41b7735f7.png" alt="CrackIt! Logo" class="nav-logo" id="headerLogo">
            </div>
            <div class="nav-links">
                <!-- Removed Features link -->
                <a href="#download" class="nav-btn terminal-btn">Init_Download</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1 class="animate-up glitch" data-text="Access Granted.">Access Granted.</h1>
                <h2 class="animate-up delay-1">Initialize <span class="hacker-text">CrackIt_v4.0</span></h2>
                <p class="subtitle animate-up delay-2">> Your ultimate coding interview sidekick._ <br>> Bypassing standard logic... <br>> Injecting AI diagnostics...</p>
                <div class="cta-container animate-up delay-3">
                    <a href="CrackIt_4.exe" download="CrackIt_4.exe" class="download-btn terminal-btn" id="downloadBtn">
                        <span class="btn-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M5 20H19V18H5M19 9H15V3H9V9H5L12 16L19 9Z" fill="currentColor"/>
                            </svg>
                        </span>
                        [ DOWNLOAD EXECUTABLE ]
                    </a>
                    <p class="version-info">Status: ONLINE | Target: Windows</p>
                </div>
            </div>
            <div class="hero-image animate-up delay-4">
                <div class="video-wrapper">
                    <video id="heroVideo" src="process.mp4" playsinline></video>
                    <div class="custom-video-controls">
                        <button id="playPauseBtn" class="control-btn">▶</button>
                        <div class="progress-bar-container" id="progressContainer">
                            <div id="progressBar" class="progress-bar"></div>
                        </div>
                        <button id="muteBtn" class="control-btn">🔊</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>> &copy; 2026 CrackIt! Network. All rights reserved. _</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
